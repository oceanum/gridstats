!!python/object/apply:onstats.stats.Stats
kwds:
  outfile: ./tmp.nc
  urlpath: /data/era5/sea_ice_cover-202001.nc
  engine: netcdf4
  n_workers: 4
  calls:
    - method: apply_func
      kwargs:
        func: mean
        # group: month
        data_vars: all
        chunks:
          latitude: 100
          longitude: 100

