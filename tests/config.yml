init:
  # From Stats
  master_url: /source/stats/tests/catalog/oceanum.yml
  namespace: hindcast
  dataset: era5_wind10m
  # intake_catalog: /config/catalog/intake/oceanum.yml
  mask: null
  slice_dict: {}
  chunks:
    latitude: 50
    longitude: 50
  persist: False
  # From DerivedVar
  var_uwnd: u10
  var_vwnd: v10

calls:
  - method: apply_func
    kwargs:
      func: mean
      data_vars:
        - u10
        - v10
      derived_vars:
        - wspd

  - method: apply_func
    kwargs:
      func: quantile
      q: [0.5, 0.9]
      data_vars:
        - u10
        - v10

  - method: time_probability
    kwargs:
      derived_vars:
        - wspd
      bins: [0.,1.]
      bin_name: cover

  - method: to_netcdf
    kwargs:
      outfile: /source/stats/tests/gridstat.nc
      format: NETCDF4
      zlib: True
