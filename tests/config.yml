!!python/object/apply:onstats.stats.Stats
kwds:
  outfile: ./tmp.nc
  urlpath: ./tasman.nc
  engine: netcdf4
  cluster_kwargs:
    processes: True
    n_workers: null
    threads_per_worker: 1
  calls:

    - func: rpv
      return_periods: [10, 100]
      percentile: 95
      distribution: gumbel_r
      duration: 24
      dim: time
      data_vars: [hs, hsea, hswe]
      chunks: {}
      ystep: 50

    - func: mean
      dim: time
      # group: month
      data_vars: [hs, hsea, hswe]
      chunks:
        latitude: 100
        longitude: 100

    - func: min
      dim: time
      data_vars: [hs, hsea, hswe]
      chunks:
        latitude: 100
        longitude: 100

    - func: max
      dim: time
      data_vars: [hs, hsea, hswe]
      chunks:
        latitude: 100
        longitude: 100

    - func: quantile
      dim: time
      q: [0.95, 0.99]
      data_vars: [hs, hsea, hswe]
      chunks:
        time: -1
        latitude: 50
        longitude: 50
