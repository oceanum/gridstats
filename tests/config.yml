init:
  # From Stats
  # master_url: /source/onstats/tests/catalog/oceanum.yml
  # namespace: hindcast
  # dataset: era5_wind10m
  dataset: /source/onzarr/tests/catalog/era5_wind.zarr
  mask: null
  slice_dict:
    sel:
      latitude: !!python/object/apply:slice [-30, 30]
      longitude: !!python/object/apply:slice [0, 90]
  chunks:
    latitude: 50
    longitude: 50
  persist: False
  # From DerivedVar
  var_uwnd: u10
  var_vwnd: v10
  var_uwnd150: u10
  var_vwnd150: v10

calls:
  # - method: apply_stat_sector
  #   kwargs:
  #     func: mean
  #     data_vars:
  #       - wspd
  #     sectors:
  #       wdir:
  #         start: 45
  #         stop: 45
  #         step: 90
  #         circular: True

  - method: data_count
    kwargs:
      data_vars: all

  - method: apply_func
    kwargs:
      func: mean
      data_vars: all
      derived_vars:
        - wspd
        - winpow

  - method: apply_func
    kwargs:
      func: quantile
      q: [0.5, 0.9]
      data_vars:
        - u10
      derived_vars:
        - wspd

  - method: value_probability
    kwargs:
      derived_vars:
        - wspd
      bins: [0., 1.]
      bin_name: cover

  - method: range_probability
    kwargs:
      dim: time
      data_ranges:
        - var: wspd
          label: p_wspd_lt_5
          start: null
          stop: 5
          left: closed
          right: open
        - var: wspd
          label: p_wspd_5_to_10
          start: 5
          stop: 10
          left: closed
          right: open
        - var: wspd
          label: p_wspd_gt_10
          start: 10
          stop: null
          left: closed
          right: closed

  - method: to_netcdf
    kwargs:
      outfile: /source/onstats/tests/gridstat.nc
      format: NETCDF4

  - method: to_zarr
    kwargs:
      outfile: /source/onstats/tests/gridstat.zarr

  - method: upload
    kwargs:
      files:
        - /source/onstats/tests/gridstat.nc
        - /source/onstats/tests/gridstat.zarr
      updir: gs://oceanum-tmp/test-stats
